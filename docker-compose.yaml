version: '3'
services:
  node:
    build: 
      dockerfile: ./Dockerfile
      context: .
    container_name: scholariocash_api
    restart: always
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "3001:3001"
    environment:
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - MYSQL_HOST=database
      - MYSQL_PORT=3306
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.0.29
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=scholariocashdb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    ports:
      - "33060:3306"
    volumes:
        - ./scholario_script.sql:/docker-entrypoint-initdb.d/scholario_script.sql
